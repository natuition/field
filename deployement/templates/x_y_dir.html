{% extends "layout.html" %}

{% set active_step=4 %}

{% block title %}Setup direction of axis X, Y and DIR.{% endblock %}

{% block head %}
<script type="text/javascript" src="{{ url_for('static', filename='js/x_y_dir.js') }}"></script>
{% endblock %}

{% block content %}
<section id="x_y_dir_container">
    <div class="d-flex justify-content-center align-items-center" style="margin: 0 auto; padding: 10px 0;">
        <label class="form-check-label" for="xDone">X axis :</label>
        <div class="btn-group-vertical m-1">
            <button type="button" id="x_add" class="btn btn-secondary"
                onclick="socketio.emit('x_y_dir', {x: {{ X_MAX }}*0.2 })">Right</button>
            <button type="button" id="x_remove" class="btn btn-secondary"
                onclick="socketio.emit('x_y_dir', {x: - {{ X_MAX }}*0.2 })">Left</button>
        </div>
        <label class="ms-2 form-check-label" for="flexSwitchCheckDefault">Invert axis : </label>
        <div class="ms-1 form-check form-switch d-flex align-items-center">
            <input class="form-check-input switch" type="checkbox" role="switch" id="invX" onclick="invertSwitch();">
        </div>
    </div>
    <div class="d-flex justify-content-center align-items-center" style="margin: 0 auto; padding: 10px 0;">
        <label class="form-check-label" for="xDone">Y axis :</label>
        <div class="btn-group-vertical m-1">
            <button type="button" id="y_add" class="btn btn-secondary"
                onclick="socketio.emit('x_y_dir', {y: {{ Y_MAX }}*0.2})">Up</button>
            <button type="button" id="y_remove" class="btn btn-secondary"
                onclick="socketio.emit('x_y_dir', {y: -{{ Y_MAX }}*0.2})">Down</button>
        </div>
        <label class="ms-2 form-check-label" for="flexSwitchCheckDefault">Invert axis : </label>
        <div class="ms-1 form-check form-switch d-flex align-items-center">
            <input class="form-check-input switch" type="checkbox" role="switch" id="invY" onclick="invertSwitch();">
        </div>
    </div>
    <div class="d-flex justify-content-center align-items-center" style="margin: 0 auto; padding: 10px 0;">
        <label class="form-check-label" for="xDone">Dir axis :</label>
        <div class="btn-group-vertical m-1">
            <button type="button" id="dir_add" class="btn btn-secondary"
                onclick="socketio.emit('x_y_dir', {a: {{ A_MAX }}*0.5})">Left</button>
            <button type="button" id="dir_remove" class="btn btn-secondary"
                onclick="socketio.emit('x_y_dir', {a: -{{ A_MAX }}*0.5})">Right</button>
        </div>
        <label class="ms-2 form-check-label" for="flexSwitchCheckDefault">Invert axis : </label>
        <div class="ms-1 form-check form-switch d-flex align-items-center">
            <input class="form-check-input switch" type="checkbox" role="switch" id="invDir" onclick="invertSwitch();">
        </div>
    </div>
    <div class="d-flex justify-content-center align-items-center" style="margin: 0 auto; padding: 10px 0;">
        <button type="button" id="invert" class="btn btn-secondary d-none"
            onclick="socketio.emit('x_y_dir', {'inv': {'X':$('#invX').is(':checked'),'Y':$('#invY').is(':checked'),'A':$('#invDir').is(':checked')}});disableAfterApplyInvert();">
            <span id="spinner" class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
            <span id="content_apply_invert">Apply invert</span>
        </button>
    </div>
    <div class="d-flex justify-content-center align-items-center" style="margin: 0 auto; padding: 10px 0;">
        <div class="form-check form-check-inline">
            <input class="form-check-input check" type="checkbox" id="xDone" onclick="enableNext()">
            <label class="form-check-label" for="xDone">X axis done</label>
        </div>
        <div class="form-check form-check-inline">
            <input class="form-check-input check" type="checkbox" id="yDone" onclick="enableNext()">
            <label class="form-check-label" for="yDone">Y axis done</label>
        </div>
        <div class="form-check form-check-inline">
            <input class="form-check-input check" type="checkbox" id="dirDone" onclick="enableNext()">
            <label class="form-check-label" for="dirDone">Dir axis done</label>
        </div>
        <button type="button" id="next" class="btn btn-danger"
            onclick="socketio.emit('validate_log', {'key': 'X Y DIR setup', 'value': 'OK'});window.location.href=get_next_page_ref({{ active_step }})">Next</button>
    </div>
</section>
<script>
    var inreset = {{ IN_RESET }};
</script>
{% endblock %}
