{% extends "layout.html" %}

{% set active_step=8 %}

{% block title %}Client configuration apply{% endblock %}

{% block head %}
<script type="text/javascript" src="{{ url_for('static', filename='js/client_config.js') }}"></script>
{% endblock %}

{% block content %}

<div class="d-flex justify-content-center align-items-center" style="margin: 0 auto; padding: 10px 0;">
    <label class="form-check-label" for="xDone">Put the robot in customer configuration :</label>
    <div class="btn-group-vertical m-1">
        <button type="button" id="apply_config" class="btn btn-secondary" onclick="run_apply_config()">Run</button>
    </div>
</div>
<div class="d-flex justify-content-center align-items-center" style="margin: 0 auto; padding: 10px 0;">
    <button type="button" id="next" class="btn btn-secondary"
        onclick="window.location.href=get_next_page_ref({{ active_step }})">Next</button>
</div>

{% endblock %}
