{% extends "layout.html" %}

{% set active_step=6 %}

{% block title %}Round detection for crop camera{% endblock %}

{% block head %}
<script type="text/javascript" src="{{ url_for('static', filename='js/camera_crop_picture.js') }}"></script>
{% endblock %}

{% block content %}

<div style="height: 72vh; margin: 0 auto;">
    <div id="spinner" style="height: 100%;" class="d-flex justify-content-center align-items-center">
        <div class="spinner-border" style="width: 5rem; height: 5rem;" role="status"></div>
    </div>
    <img id="fig_image" class="d-none"
        style="height: 100%; margin: 0 auto; border-radius: 100px; overflow: hidden; display:block;">
</div>
<div class="d-flex justify-content-center align-items-center" style="margin: 0 auto; padding: 10px 0;">
    <div class="form-check form-check-inline">
        <input class="form-check-input" type="checkbox" id="roundDetectionDone" onclick="enableNext()">
        <label class="form-check-label" for="roundDetectionDone">Round detection done</label>
    </div>
    <button type="button" id="next" class="btn btn-danger"
        onclick="socketio.emit('validate_log', {'key': 'Camera crop', 'value': 'OK'});window.location.href=get_next_page_ref({{ active_step }})">Next</button>
</div>

{% endblock %}
